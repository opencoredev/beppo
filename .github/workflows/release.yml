name: Release

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      short_sha: ${{ steps.release_meta.outputs.short_sha }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      cli_dist_tag: ${{ steps.release_meta.outputs.cli_dist_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          NIGHTLY_DATE: ${{ github.run_started_at }}
          NIGHTLY_SHA: ${{ github.sha }}
          NIGHTLY_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || ( "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_CHANNEL:-stable}" == "nightly" ) ]]; then
            nightly_date="$(date -u -d "$NIGHTLY_DATE" +%Y%m%d)"

            node scripts/resolve-nightly-release.ts \
              --date "$nightly_date" \
              --run-number "$NIGHTLY_RUN_NUMBER" \
              --sha "$NIGHTLY_SHA" \
              --github-output

            echo "release_channel=nightly" >> "$GITHUB_OUTPUT"
            echo "cli_dist_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              raw="${DISPATCH_VERSION}"
              if [[ -z "$raw" ]]; then
                echo "workflow_dispatch stable releases require the version input." >&2
                exit 1
              fi
            else
              raw="${GITHUB_REF_NAME}"
            fi

            version="${raw#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release version: $raw" >&2
              exit 1
            fi

            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "name=Beppo v$version" >> "$GITHUB_OUTPUT"
            echo "cli_dist_tag=latest" >> "$GITHUB_OUTPUT"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - id: previous_tag
        name: Resolve previous release tag
        run: |
          node scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
            electrobun_target: macos-arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            arch: x64
            electrobun_target: macos-x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            electrobun_target: linux-x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
            electrobun_target: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Import Apple code-signing certificate
        if: ${{ matrix.platform == 'mac' }}
        shell: bash
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.CSC_LINK }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${MAC_CERTIFICATE_BASE64:-}" || -z "${MAC_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Apple signing certificate unavailable; skipping certificate import."
            exit 0
          fi

          keychain_path="$RUNNER_TEMP/beppo-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/beppo-signing-cert.p12"

          printf '%s' "$MAC_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MAC_CERTIFICATE_PASSWORD" -A -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"

          existing_keychains="$(security list-keychains -d user | tr -d '\"')"
          security list-keychains -d user -s "$keychain_path" $existing_keychains

      - name: Resolve Apple signing environment
        if: ${{ matrix.platform == 'mac' }}
        id: mac_signing
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTROBUN_APPLEID_SECRET: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS_SECRET: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_TEAMID_SECRET: ${{ secrets.ELECTROBUN_TEAMID }}
        run: |
          set -euo pipefail

          developer_id="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application[^"]*\)".*/\1/p' | head -n 1)"
          if [[ -n "$developer_id" ]]; then
            echo "developer_id=$developer_id" >> "$GITHUB_OUTPUT"
            echo "codesign_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "codesign_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          apple_id="${ELECTROBUN_APPLEID_SECRET:-${APPLE_ID:-}}"
          apple_id_pass="${ELECTROBUN_APPLEIDPASS_SECRET:-${APPLE_APP_SPECIFIC_PASSWORD:-}}"
          team_id="${ELECTROBUN_TEAMID_SECRET:-${APPLE_TEAM_ID:-}}"

          if [[ -n "$apple_id" && -n "$apple_id_pass" && -n "$team_id" ]]; then
            echo "apple_id=$apple_id" >> "$GITHUB_OUTPUT"
            echo "apple_id_pass=$apple_id_pass" >> "$GITHUB_OUTPUT"
            echo "team_id=$team_id" >> "$GITHUB_OUTPUT"
            echo "notarize_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Align package versions to release version
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "${RELEASE_VERSION}"

      - name: Build bundled web/server assets
        if: ${{ matrix.platform != 'win' }}
        run: bun run build --filter=@t3tools/web --filter=t3

      - name: Build bundled web/server assets
        if: ${{ matrix.platform == 'win' }}
        shell: pwsh
        run: |
          bun run --cwd packages/contracts build
          bun run --cwd apps/web build
          bun run --cwd apps/server build

      - name: Build desktop artifact
        if: ${{ matrix.platform != 'win' }}
        shell: bash
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ steps.mac_signing.outputs.developer_id }}
          ELECTROBUN_APPLEID: ${{ steps.mac_signing.outputs.apple_id }}
          ELECTROBUN_APPLEIDPASS: ${{ steps.mac_signing.outputs.apple_id_pass }}
          ELECTROBUN_TEAMID: ${{ steps.mac_signing.outputs.team_id }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
          ELECTROBUN_TARGETS: ${{ matrix.electrobun_target }}
          T3CODE_DESKTOP_VERSION: ${{ needs.preflight.outputs.version }}
          T3CODE_DESKTOP_UPDATE_BASE_URL: https://github.com/opencoredev/beppo/releases/latest/download
          BUILD_PLATFORM: ${{ matrix.platform }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${BUILD_PLATFORM}" == "mac" ]]; then
            if [[ "${{ steps.mac_signing.outputs.codesign_enabled }}" == "true" ]]; then
              echo "macOS codesigning enabled."
            else
              echo "macOS codesigning disabled (certificate or identity unavailable)."
            fi

            if [[ "${{ steps.mac_signing.outputs.notarize_enabled }}" == "true" ]]; then
              echo "macOS notarization enabled."
            else
              echo "macOS notarization disabled (Apple ID credentials unavailable)."
            fi
          elif [[ "${BUILD_PLATFORM}" == "win" ]]; then
            if has_all \
              "$AZURE_TENANT_ID" \
              "$AZURE_CLIENT_ID" \
              "$AZURE_CLIENT_SECRET" \
              "$AZURE_TRUSTED_SIGNING_ENDPOINT" \
              "$AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" \
              "$AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" \
              "$AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"; then
              echo "Windows signing configuration detected."
            else
              echo "Windows signing unavailable for this Electrobun release path."
            fi
          else
            echo "Signing disabled for ${BUILD_PLATFORM}."
          fi

          bun run dist:desktop:artifact

      - name: Build desktop artifact
        if: ${{ matrix.platform == 'win' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
          ELECTROBUN_TARGETS: ${{ matrix.electrobun_target }}
          T3CODE_DESKTOP_VERSION: ${{ needs.preflight.outputs.version }}
          T3CODE_DESKTOP_UPDATE_BASE_URL: https://github.com/opencoredev/beppo/releases/latest/download
        run: |
          $requiredVars = @(
            "AZURE_TENANT_ID",
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT_NAME",
            "AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME",
            "AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"
          )

          $missingVars = $requiredVars | Where-Object {
            [string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$_" -ErrorAction SilentlyContinue).Value)
          }

          if ($missingVars.Count -eq 0) {
            Write-Host "Windows signing enabled (Azure Trusted Signing)."
          } else {
            Write-Host "Windows signing disabled (missing one or more Azure Trusted Signing secrets)."
          }

          bun run dist:desktop:artifact

      - name: Collect release assets
        shell: bash
        env:
          BUILD_PLATFORM: ${{ matrix.platform }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            shopt -s nullglob
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-${{ matrix.arch }}.yml"
            done
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish_cli:
    name: Publish CLI to npm
    needs: [preflight, build]
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Skip npm publish when token is unavailable
        if: ${{ !env.NODE_AUTH_TOKEN }}
        run: echo "NPM_TOKEN is not configured. Skipping CLI publish."

      - name: Align package versions to release version
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "${RELEASE_VERSION}"

      - name: Build CLI package
        if: ${{ env.NODE_AUTH_TOKEN }}
        run: bun run build --filter=@t3tools/web --filter=t3

      - name: Publish CLI package
        run: node apps/server/scripts/cli.ts publish --tag "${{ needs.preflight.outputs.cli_dist_tag }}" --app-version "${{ needs.preflight.outputs.version }}" --verbose

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          shopt -s nullglob
          for x64_manifest in release-assets/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-mac-update-manifests.ts "$arm64_manifest" "$x64_manifest"
              rm -f "$x64_manifest"
            fi
          done

      - name: Write release notes preamble
        shell: bash
        run: |
          cat > release-notes-preamble.md <<'EOF'
          > [!IMPORTANT]
          > macOS builds may be unsigned when Apple Developer signing credentials are unavailable.
          > If Finder blocks Beppo on first launch, try the standard right-click open flow first.
          > If that still fails, run:
          >
          > ```bash
          > xattr -dr com.apple.quarantine /Applications/Beppo.app
          > ```
          >
          > Windows may show a SmartScreen warning for an unknown publisher.
          > Linux builds may require `chmod +x path/to/Beppo` after extraction.
          EOF

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          body_path: release-notes-preamble.md
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          body_path: release-notes-preamble.md
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true

  finalize:
    name: Finalize release
    if: needs.preflight.outputs.release_channel == 'stable'
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - id: app_token
        name: Mint release app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: bunx oxfmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          BOT_NAME: ${{ steps.app_bot.outputs.name }}
          BOT_EMAIL: ${{ steps.app_bot.outputs.email }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
